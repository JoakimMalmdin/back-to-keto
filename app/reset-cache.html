<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rensa Back to Keto-cache</title>
    <style>
      body {
        margin: 0;
        background: #fbf7ef;
        color: #1f2523;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 14px;
        width: min(100%, 520px);
        margin: 0 auto;
        padding: 28px 18px;
      }

      a,
      button {
        border: 0;
        border-radius: 8px;
        background: #274a3c;
        color: white;
        cursor: pointer;
        display: inline-flex;
        justify-content: center;
        min-height: 44px;
        padding: 12px 16px;
        text-decoration: none;
        font: inherit;
        font-weight: 800;
      }

      p {
        color: #69736d;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Rensa app-cache</h1>
      <p id="status">Rensar gammal offline-cache. Din sparade keto-logg lämnas kvar.</p>
      <button id="resetButton" type="button">Rensa igen</button>
      <a href="./?v=9">Öppna appen</a>
    </main>
    <script>
      async function resetCache() {
        const status = document.querySelector("#status");
        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }
          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
          status.textContent = "Klart. Öppna appen igen med knappen nedan.";
        } catch (error) {
          status.textContent = "Kunde inte rensa allt automatiskt. Testa att ladda om appen med ?v=9 i adressen.";
        }
      }

      document.querySelector("#resetButton").addEventListener("click", resetCache);
      resetCache();
    </script>
  </body>
</html>
